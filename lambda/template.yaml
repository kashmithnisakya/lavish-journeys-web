AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Lavish Travels & Tours - Inquiry API (Lambda + API Gateway + SES)

Globals:
  Function:
    Timeout: 15
    Runtime: nodejs20.x
    MemorySize: 256
    Environment:
      Variables:
        FROM_EMAIL: !Ref FromEmail
        SUPPORT_EMAIL: !Ref SupportEmail
        ALLOWED_ORIGINS: !Ref AllowedOrigins

Parameters:
  FromEmail:
    Type: String
    Description: Verified SES sender email address (e.g. support@lavishtravelsandtours.online)
  SupportEmail:
    Type: String
    Description: Email address to receive inquiry notifications
  AllowedOrigins:
    Type: String
    Default: "https://lavishtravelsandtours.online"
    Description: CORS allowed origins

Resources:
  InquiryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: .
      Description: Handles inquiry form submissions and sends emails via AWS SES
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        InquiryApi:
          Type: HttpApi
          Properties:
            Path: /api/inquiry
            Method: POST
            ApiId: !Ref InquiryHttpApi
        InquiryOptions:
          Type: HttpApi
          Properties:
            Path: /api/inquiry
            Method: OPTIONS
            ApiId: !Ref InquiryHttpApi

  InquiryHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "https://lavishtravelsandtours.online"
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - POST
          - OPTIONS

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${InquiryHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt InquiryFunction.Arn
